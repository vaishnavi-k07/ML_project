<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Performance Predictor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="card">
        <h1>🎓 Student Performance Predictor</h1>
        <p class="subtitle">Predict Maths Score using AI</p>

        <form action="{{ url_for('predict_datapoint') }}" method="post">

            <div class="grid">

                <!-- Gender -->
                <div class="input-box">
                    <label>Gender</label>
                    <select name="gender" required>
                        <option disabled selected>Select</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <!-- Ethnicity -->
                <div class="input-box">
                    <label>Race / Ethnicity</label>
                    <select name="race_ethnicity" required>
                        <option disabled selected>Select</option>
                        <option value="group A">Group A</option>
                        <option value="group B">Group B</option>
                        <option value="group C">Group C</option>
                        <option value="group D">Group D</option>
                        <option value="group E">Group E</option>
                    </select>
                </div>

                <!-- Parent Education -->
                <div class="input-box">
                    <label>Parental Education</label>
                    <select name="parental_level_of_education" required>
                        <option disabled selected>Select</option>
                        <option value="associate's degree">Associate's</option>
                        <option value="bachelor's degree">Bachelor's</option>
                        <option value="high school">High School</option>
                        <option value="master's degree">Master's</option>
                        <option value="some college">Some College</option>
                        <option value="some high school">Some High School</option>
                    </select>
                </div>

                <!-- Lunch -->
                <div class="input-box">
                    <label>Lunch</label>
                    <select name="lunch" required>
                        <option disabled selected>Select</option>
                        <option value="standard">Standard</option>
                        <option value="free/reduced">Free/Reduced</option>
                    </select>
                </div>

                <!-- Test Prep -->
                <div class="input-box">
                    <label>Test Preparation</label>
                    <select name="test_preparation_course" required>
                        <option disabled selected>Select</option>
                        <option value="none">None</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>

                <!-- Reading -->
                <div class="input-box">
                    <label>Reading Score</label>
                    <input type="number" name="reading_score" min="0" max="100" required>
                </div>

                <!-- Writing -->
                <div class="input-box">
                    <label>Writing Score</label>
                    <input type="number" name="writing_score" min="0" max="100" required>
                </div>

            </div>

            <!-- Button -->
            <button type="submit">🚀 Predict Score</button>

        </form>

        <!-- Result -->
        {% if results %}
        <div class="result">
            <h2>📊 Predicted Maths Score</h2>
            <p>{{ results }}</p>
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
